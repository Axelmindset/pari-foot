<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prédictions Foot Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; font-size: 0.9em; color: #7f8c8d; margin-bottom: 25px; }
        label { font-weight: bold; margin-top: 15px; display: block; color: #34495e; }
        input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: #27ae60; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; margin-top: 25px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2ecc71; }
        #result { margin-top: 25px; padding: 20px; background: #e8f8f5; border-left: 5px solid #1abc9c; border-radius: 4px; display: none; }
        .win-text { font-size: 1.2em; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Analyse et Prédiction</h1>
        <div class="subtitle">Basé sur les données des 2 derniers matchs</div>
        
        <label for="equipeA">Équipe A (Domicile) :</label>
        <input type="text" id="equipeA" placeholder="Ex: Paris Saint-Germain">
        
        <label for="equipeB">Équipe B (Extérieur) :</label>
        <input type="text" id="equipeB" placeholder="Ex: Olympique de Marseille">
        
        <button onclick="lancerPrediction()">Générer la Prédiction</button>
        
        <div id="result"></div>
    </div>

    <script>
        function lancerPrediction() {
            const eqA = document.getElementById('equipeA').value;
            const eqB = document.getElementById('equipeB').value;
            
            if(!eqA || !eqB) {
                alert("Veuillez entrer les noms des deux équipes.");
                return;
            }

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `<p><em>Analyse des statistiques (Possession, Passes, Tirs Cadrés, xG, Corners) en cours pour ${eqA} et ${eqB}...</em></p>`;

            // Simulate the data gathering and algorithm execution
            setTimeout(() => {
                // In a production app, you would fetch real API data here.
                // We are using mock data parameters to demonstrate the algorithm.
                // Parameters: Possession(%), Passes, ShotAccuracy(Ratio), xGPerShot(Ratio), Corners
                const scoreA = calculateTeamStrength(55, 450, 0.40, 0.12, 6); 
                const scoreB = calculateTeamStrength(45, 380, 0.35, 0.09, 4);

                let prediction = "";
                if (scoreA > scoreB * 1.1) {
                    prediction = `Victoire probable de <strong>${eqA}</strong>`;
                } else if (scoreB > scoreA * 1.1) {
                    prediction = `Victoire probable de <strong>${eqB}</strong>`;
                } else {
                    prediction = `Match très serré, <strong>Match Nul</strong> probable`;
                }

                resultDiv.innerHTML = `
                    <p class="win-text">${prediction}</p>
                    <hr style="border: 0; border-top: 1px solid #bdc3c7; margin: 15px 0;">
                    <p><small>L'algorithme a comparé : le pourcentage de possession, les passes réussies, le ratio tirs/tirs cadrés, le ratio xG/tirs, et les corners obtenus lors des deux derniers matchs.</small></p>
                `;
            }, 1500);
        }

        // The Prediction Algorithm Logic
        function calculateTeamStrength(possession, passes, shotAccuracy, xGPerShot, corners) {
            // Weights applied to normalize the different metrics into a single "Strength Score"
            const weightPossession = 0.2;
            const weightPasses = 0.005; // Scaled down because pass numbers are in the hundreds
            const weightShotAccuracy = 50; // Scaled up because it's a decimal ratio
            const weightXgShot = 100; // Scaled up heavily to reward high-quality chances
            const weightCorners = 0.5;

            return (possession * weightPossession) + 
                   (passes * weightPasses) + 
                   (shotAccuracy * weightShotAccuracy) + 
                   (xGPerShot * weightXgShot) + 
                   (corners * weightCorners);
        }
    </script>
</body>
</html>
