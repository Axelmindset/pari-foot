<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prono Bot 2026</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #121212; color: white; text-align: center; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 15px; max-width: 400px; margin: auto; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00ff88; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 8px; background: #2a2a2a; color: white; }
        button { background: #00ff88; color: #000; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #resultat { margin-top: 25px; }
        .success { border: 2px solid #00ff88; padding: 15px; border-radius: 10px; background: rgba(0, 255, 136, 0.1); }
        .error { color: #ff4444; background: rgba(255, 68, 68, 0.1); padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚽ Prono Bot v2026</h2>
    <p style="font-size: 0.8em; color: #aaa;">Données Saison 2025/2026</p>
    
    <input type="password" id="apiKey" placeholder="Clé API">
    <input type="number" id="homeId" placeholder="ID Domicile (ex: 85)">
    <input type="number" id="awayId" placeholder="ID Extérieur (ex: 81)">
    
    <button onclick="predire()">Calculer Pronostic</button>

    <div id="resultat"></div>
</div>

<script>
async function fetchStats(teamId, apiKey) {
    // Mise à jour pour la saison 2025 (correspondant à l'année 2026)
    const url = `https://v3.football.api-sports.io/teams/statistics?league=61&season=2025&team=${teamId}`;
    
    const response = await fetch(url, {
        method: "GET",
        headers: {
            "x-rapidapi-key": apiKey,
            "x-rapidapi-host": "v3.football.api-sports.io"
        }
    });

    const data = await response.json();

    if (data.errors && Object.keys(data.errors).length > 0) {
        throw new Error("Problème de clé API.");
    }

    if (!data.response || !data.response.goals || !data.response.goals.for) {
        throw new Error("Données 2025 indisponibles pour l'ID " + teamId);
    }

    return data.response.goals.for.average.total;
}

async function predire() {
    const key = document.getElementById('apiKey').value.trim();
    const homeId = document.getElementById('homeId').value;
    const awayId = document.getElementById('awayId').value;
    const resDiv = document.getElementById('resultat');

    if (!key || !homeId || !awayId) {
        resDiv.innerHTML = "<p class='error'>Champs vides !</p>";
        return;
    }

    resDiv.innerHTML = "⏳ Analyse en direct...";

    try {
        const avgHome = await fetchStats(homeId, key);
        const avgAway = await fetchStats(awayId, key);

        const goalsHome = parseFloat(avgHome).toFixed(1);
        const goalsAway = parseFloat(avgAway).toFixed(1);

        resDiv.innerHTML = `
            <div class="success">
                <p style="margin: 0;">Score estimé</p>
                <p style="font-size: 35px; font-weight: bold; margin: 10px 0;">
                    ${Math.round(goalsHome)} - ${Math.round(goalsAway)}
                </p>
                <small>Moyennes Saison 25/26 : ${goalsHome} - ${goalsAway}</small>
            </div>
        `;
    } catch (error) {
        resDiv.innerHTML = `<p class="error">❌ ${error.message}</p>`;
    }
}
</script>

</body>
</html>
