<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Football Predictor - Expert Manuel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --green: #2ecc71; --blue: #3498db; --text: #f8fafc; --border: #334155; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; font-size: 14px; }
        .container { max-width: 1200px; margin: auto; }
        h1, h2 { text-align: center; color: white; }
        
        /* Structure Saisie */
        .input-wrapper { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
        .team-section { flex: 1; min-width: 350px; background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--border); }
        .match-block { background: #0f172a; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid var(--border); }
        .match-title { color: var(--green); font-weight: bold; margin-bottom: 10px; display: block; border-bottom: 1px solid var(--border); }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 11px; color: #94a3b8; margin-bottom: 3px; }
        input { padding: 8px; background: #1e293b; border: 1px solid var(--border); color: white; border-radius: 5px; }

        .btn-analyze { width: 100%; padding: 20px; background: var(--green); color: #0f172a; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; margin: 20px 0; }
        .btn-analyze:hover { filter: brightness(1.1); transform: translateY(-2px); }

        /* Résultats */
        .results-area { display: none; margin-top: 30px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .res-card { background: var(--card); padding: 20px; border-radius: 15px; border-left: 5px solid var(--green); }
        .prob-val { font-size: 24px; font-weight: bold; color: var(--green); display: block; margin-top: 10px; }
        
        .chart-container { background: var(--card); padding: 20px; border-radius: 15px; grid-column: span 2; min-height: 300px; }
        .text-analysis { background: rgba(46, 204, 113, 0.1); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid var(--green); }

        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } .chart-container { grid-column: span 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>⚽ IA Predictor - Analyse 3 Matchs</h1>
    
    <div class="input-wrapper">
        <section class="team-section">
            <input type="text" id="nameA" placeholder="Nom Équipe Domicile" style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">
            <div id="inputsA"></div>
        </section>

        <section class="team-section">
            <input type="text" id="nameB" placeholder="Nom Équipe Extérieur" style="font-size: 18px; font-weight: bold; margin-bottom: 10px;">
            <div id="inputsB"></div>
        </section>
    </div>

    <button class="btn-analyze" onclick="calculateDeepAnalysis()">LANCER L'ANALYSE EXPERTE</button>

    <div id="results" class="results-area">
        <div class="dashboard">
            <div class="res-card">
                <span class="match-title">PROBABILITÉS 1N2</span>
                <p>Victoire <span id="outNameA">A</span>: <span id="probA" class="prob-val">--%</span></p>
                <p>Match Nul: <span id="probN" class="prob-val">--%</span></p>
                <p>Victoire <span id="outNameB">B</span>: <span id="probB" class="prob-val">--%</span></p>
            </div>
            <div class="res-card" style="border-left-color: var(--blue);">
                <span class="match-title">BUTS & PRÉDICTIONS</span>
                <p>Over 2.5: <span id="probOver" class="prob-val">--%</span></p>
                <p>Under 2.5: <span id="probUnder" class="prob-val">--%</span></p>
                <p>Double Chance: <span id="resDC" class="prob-val">--</span></p>
            </div>
            <div class="res-card" style="border-left-color: #f1c40f;">
                <span class="match-title">RECOMMANDATION FINALE</span>
                <p>Buteur probable: <span id="resScorer" class="prob-val" style="color: #f1c40f;">--</span></p>
                <p>Conseil: <span id="resTip" class="prob-val" style="color: white; font-size: 16px;">--</span></p>
            </div>
            <div class="chart-container">
                <canvas id="radarChart"></canvas>
            </div>
            <div class="res-card" style="grid-column: span 1;">
                <span class="match-title">STATS MOYENNES (3 MATCHS)</span>
                <div id="avgStatsDisplay" style="font-size: 12px; line-height: 1.8;"></div>
            </div>
        </div>

        <div class="text-analysis">
            <strong>🧠 Analyse de l'Intelligence Artificielle :</strong>
            <p id="aiText"></p>
        </div>
    </div>
</div>

<script>
    // Génération automatique des champs de saisie
    const statsList = [
        { id: 'poss', label: 'Possession %' }, { id: 'pass', label: 'Passes' },
        { id: 'shots', label: 'Tirs' }, { id: 'sot', label: 'Tirs Cadrés' },
        { id: 'xg', label: 'xG' }, { id: 'corn', label: 'Corners' },
        { id: 'scon', label: 'Tirs Concédés' }, { id: 'sotcon', label: 'Cadrés Conc.' },
        { id: 'xga', label: 'xGA' }, { id: 'corncon', label: 'Corners Conc.' }
    ];

    function createInputs(containerId, prefix) {
        const container = document.getElementById(containerId);
        for(let i=1; i<=3; i++) {
            let html = `<div class="match-block"><span class="match-title">Match ${i}</span><div class="grid-inputs">`;
            statsList.forEach(s => {
                html += `<div class="field"><label>${s.label}</label><input type="number" id="${prefix}_m${i}_${s.id}" step="0.1" value="0"></div>`;
            });
            html += `</div></div>`;
            container.innerHTML += html;
        }
    }
    createInputs('inputsA', 'a');
    createInputs('inputsB', 'b');

    function calculateDeepAnalysis() {
        const getData = (p) => {
            let totals = {};
            statsList.forEach(s => totals[s.id] = 0);
            for(let i=1; i<=3; i++) {
                statsList.forEach(s => totals[s.id] += parseFloat(document.getElementById(`${p}_m${i}_${s.id}`).value || 0));
            }
            let avgs = {};
            for(let key in totals) avgs[key] = totals[key] / 3;
            return avgs;
        };

        const stA = getData('a');
        const stB = getData('b');

        // ALGORITHME 30/30/20/20
        const calcPower = (s) => {
            const attack = (s.xg * 0.7 + (s.sot/s.shots || 0) * 0.3) * 10;
            const defense = (10 - s.xga * 0.7 - (s.sotcon/s.scon || 0) * 0.3) * 10;
            const domination = (s.poss * 0.6 + (s.pass/1000) * 0.4);
            const pressure = (s.corn * 1.5 - s.corncon * 0.5);
            
            return {
                total: (attack * 0.3) + (defense * 0.3) + (domination * 0.2) + (pressure * 0.2),
                att: attack, def: defense, dom: domination, pres: pressure
            };
        };

        const pwrA = calcPower(stA);
        const pwrB = calcPower(stB);

        // Probabilités
        const totalPwr = pwrA.total + pwrB.total;
        const probA = (pwrA.total / totalPwr) * 100;
        const probB = (pwrB.total / totalPwr) * 100;
        const probN = 100 - (probA + probB);

        // Buts
        const expGoals = stA.xg + stB.xg;
        const overProb = Math.min(95, (expGoals / 3) * 100);

        // UI Update
        document.getElementById('results').style.display = "block";
        document.getElementById('outNameA').innerText = document.getElementById('nameA').value || "A";
        document.getElementById('outNameB').innerText = document.getElementById('nameB').value || "B";
        document.getElementById('probA').innerText = probA.toFixed(1) + "%";
        document.getElementById('probN').innerText = probN.toFixed(1) + "%";
        document.getElementById('probB').innerText = probB.toFixed(1) + "%";
        document.getElementById('probOver').innerText = overProb.toFixed(1) + "%";
        document.getElementById('probUnder').innerText = (100 - overProb).toFixed(1) + "%";
        document.getElementById('resDC').innerText = probA > probB ? "1X" : "X2";
        document.getElementById('resScorer').innerText = stA.xg > stB.xg ? (document.getElementById('nameA').value || "Équipe A") : (document.getElementById('nameB').value || "Équipe B");
        document.getElementById('resTip').innerText = probA > 55 ? "Victoire Domicile Sèche" : "Double Chance Sécurisée";

        // Texte IA
        document.getElementById('aiText').innerText = `L'analyse montre que ${document.getElementById('nameA').value} possède une efficacité xG de ${(stA.xg).toFixed(2)} contre ${(stB.xg).toFixed(2)} pour l'adversaire. La pression aux corners (${stA.corn.toFixed(1)}) suggère une domination territoriale. Recommandation : ${overProb > 60 ? 'Privilégier les buts' : 'Match potentiellement fermé'}.`;

        // Chart
        const ctx = document.getElementById('radarChart').getContext('2d');
        if(window.myRadar) window.myRadar.destroy();
        window.myRadar = new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['Attaque', 'Défense', 'Domination', 'Pression'],
                datasets: [
                    { label: document.getElementById('nameA').value || 'A', data: [pwrA.att, pwrA.def, pwrA.dom, pwrA.pres], borderColor: '#2ecc71', backgroundColor: 'rgba(46, 204, 113, 0.2)' },
                    { label: document.getElementById('nameB').value || 'B', data: [pwrB.att, pwrB.def, pwrB.dom, pwrB.pres], borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.2)' }
                ]
            },
            options: { scales: { r: { beginAtZero: true, grid: { color: '#334155' } } } }
        });
    }
</script>

</body>
</html>
