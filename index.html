<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Prono Bot Foot</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        #resultat { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚽ Prono Bot v1.0</h2>
    <input type="text" id="apiKey" placeholder="Colle ta Clé API ici">
    <input type="number" id="homeId" placeholder="ID Équipe Domicile (ex: 85)">
    <input type="number" id="awayId" placeholder="ID Équipe Extérieur (ex: 529)">
    <button onclick="predire()">Prédire le Score</button>

    <div id="resultat"></div>
</div>

<script>
async function getStats(teamId, apiKey) {
    const response = await fetch(`https://v3.football.api-sports.io/teams/statistics?league=61&season=2025&team=${teamId}`, {
        method: "GET",
        headers: { "x-rapidapi-key": apiKey, "x-rapidapi-host": "v3.football.api-sports.io" }
    });
    const data = await response.json();
    return data.response.goals.for.average.total; // Récupère la moyenne de buts
}

async function predire() {
    const key = document.getElementById('apiKey').value;
    const homeId = document.getElementById('homeId').value;
    const awayId = document.getElementById('awayId').value;
    const resDiv = document.getElementById('resultat');

    resDiv.innerHTML = "Analyse en cours...";

    try {
        const avgHome = parseFloat(await getStats(homeId, key));
        const avgAway = parseFloat(await getStats(awayId, key));

        // Algorithme simplifié (Moyenne croisée)
        const scoreHome = (avgHome).toFixed(1);
        const scoreAway = (avgAway).toFixed(1);

        resDiv.innerHTML = `<h3>Pronostic :</h3> 
                            <p>Score probable : ${Math.round(scoreHome)} - ${Math.round(scoreAway)}</p>
                            <small>(Basé sur les moyennes : ${scoreHome} - ${scoreAway})</small>`;
    } catch (error) {
        resDiv.innerHTML = "Erreur : Vérifie ta clé ou les IDs d'équipes.";
    }
}
</script>
</body>
</html>
