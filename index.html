<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>⚽ Mon Suivi Paris Sportifs</title>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 16px; background: #f5f5f5; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .kpi-big { font-size: 48px; font-weight: bold; text-align: center; }
        .green { color: #2e7d32; }
        .red { color: #c62828; }
        .label { font-size: 14px; color: #757575; text-align: center; margin-top: 8px; }
        .last-bets { margin-top: 12px; }
        .bet-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .loading { text-align: center; padding: 20px; color: #757575; }
        .error { color: #c62828; text-align: center; padding: 20px; }
        .update-time { font-size: 12px; color: #9e9e9e; text-align: right; margin-top: 16px; }
        h2 { font-size: 20px; margin-top: 0; margin-bottom: 16px; color: #333; }
        h3 { font-size: 16px; margin: 0 0 8px 0; color: #555; }
        .sparkline-container { margin: 16px 0; text-align: center; }
        .sparkline { width: 100%; height: 60px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>⚽ Paris FOOTBALL-SIMILATE</h2>
            <div id="loading" class="loading">Chargement des données...</div>
            <div id="error" class="error" style="display:none;"></div>
            <div id="dashboard" style="display:none;">
                <div style="margin-bottom: 24px;">
                    <div class="kpi-big" id="beneficeTotal"></div>
                    <div class="label">BÉNÉFICE TOTAL</div>
                </div>
                
                <div style="display: flex; gap: 16px; margin-bottom: 24px;">
                    <div style="flex: 1; text-align: center;">
                        <div style="font-size: 24px; font-weight: bold;" id="serieEnCours"></div>
                        <div class="label">SÉRIE</div>
                    </div>
                    <div style="flex: 1; text-align: center;">
                        <div style="font-size: 24px; font-weight: bold;" id="bankrollActuelle"></div>
                        <div class="label">BANKROLL</div>
                    </div>
                </div>
                
                <div class="sparkline-container">
                    <canvas id="sparklineCanvas" class="sparkline"></canvas>
                </div>
                
                <h3>📋 DERNIERS PARIS</h3>
                <div id="lastBets" class="last-bets"></div>
                
                <div class="update-time" id="updateTime"></div>
            </div>
        </div>
    </div>
    <script>
        const SHEET_ID = '15BizpkHINhXjnfYatjHE0UDpHAK6uqxcZvALweURgl0';
        const PROXY_URL = 'https://corsproxy.io/?';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

        async function fetchCSV() {
            try {
                const response = await fetch(PROXY_URL + encodeURIComponent(CSV_URL));
                const text = await response.text();
                return parseCSV(text);
            } catch (error) {
                throw new Error('Erreur réseau ou proxy');
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.split('\n');
            return lines
                .filter(line => line.trim())
                .map(line => line.replace(/"/g, '').split(','));
        }

        function processData(data) {
            if (!data || data.length < 2) throw new Error('Données vides');

            const headers = data[0];
            
            const col = {
                date: headers.findIndex(h => h.includes('Date') || h === 'A'),
                match: headers.findIndex(h => h.includes('sélection') || h.includes('Sélection') || h === 'C'),
                resultat: headers.findIndex(h => h.includes('résultat') || h.includes('Résultat') || h === 'G'),
                bankrollApres: headers.findIndex(h => h.includes('bankroll après') || h.includes('Bankroll après') || h === 'J'),
                beneficeBrut: headers.findIndex(h => h.includes('bénéfice brut') || h.includes('Bénéfice brut') || h === 'K'),
                serieGagne: headers.findIndex(h => h.includes('Serie gagné') || h.includes('Série gagné') || h === 'N')
            };

            let beneficeTotal = 0;
            const bankrollHistory = [];

            for (let i = 1; i < data.length; i++) {
                const row = data[i];
                
                if (col.beneficeBrut !== -1 && row[col.beneficeBrut]) {
                    const val = parseFloat(row[col.beneficeBrut].replace('€', '').replace(',', '.').trim());
                    if (!isNaN(val)) beneficeTotal += val;
                }
                
                if (col.bankrollApres !== -1 && row[col.bankrollApres]) {
                    const val = parseFloat(row[col.bankrollApres].replace('€', '').replace(',', '.').trim());
                    if (!isNaN(val)) bankrollHistory.push(val);
                }
            }

            const lastRow = data[data.length - 1];
            const bankrollActuelle = bankrollHistory[bankrollHistory.length - 1] || 0;
            
            let serieGagne = false;
            if (col.serieGagne !== -1 && lastRow[col.serieGagne]) {
                serieGagne = lastRow[col.serieGagne].trim() === '1';
            }

            const lastBets = [];
            for (let i = data.length - 1; i >= Math.max(1, data.length - 5) && lastBets.length < 5; i--) {
                const row = data[i];
                const match = col.match !== -1 ? row[col.match] : '';
                if (!match || !match.trim()) continue;
                
                lastBets.push({
                    date: col.date !== -1 ? row[col.date] : '',
                    match: match.trim().substring(0, 28) + (match.trim().length > 28 ? '…' : ''),
                    resultat: col.resultat !== -1 ? row[col.resultat] : '',
                    benefice: col.beneficeBrut !== -1 ? parseFloat(row[col.beneficeBrut]?.replace('€', '').replace(',', '.')) || 0 : 0
                });
            }

            return { beneficeTotal, bankrollActuelle, bankrollHistory, serieGagne, lastBets };
        }

        function drawSparkline(canvasId, data) {
            const canvas = document.getElementById(canvasId);
            if (!canvas || data.length < 2) return;
            
            const ctx = canvas.getContext('2d');
            const width = canvas.offsetWidth;
            const height = 60;
            canvas.width = width;
            canvas.height = height;
            
            const min = Math.min(...data);
            const max = Math.max(...data);
            const range = max - min || 1;
            
            ctx.clearRect(0, 0, width, height);
            ctx.beginPath();
            ctx.strokeStyle = data[data.length - 1] >= data[0] ? '#2e7d32' : '#c62828';
            ctx.lineWidth = 2;
            
            const step = width / (data.length - 1);
            data.forEach((value, index) => {
                const x = index * step;
                const y = height - ((value - min) / range) * (height - 10) - 5;
                index === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            
            ctx.stroke();
            ctx.lineTo(width, height);
            ctx.lineTo(0, height);
            ctx.closePath();
            ctx.fillStyle = data[data.length - 1] >= data[0] ? 'rgba(46, 125, 50, 0.1)' : 'rgba(198, 40, 40, 0.1)';
            ctx.fill();
        }

        function displayDashboard(stats) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            
            const benefEl = document.getElementById('beneficeTotal');
            benefEl.textContent = stats.beneficeTotal.toFixed(2) + ' €';
            benefEl.className = 'kpi-big ' + (stats.beneficeTotal >= 0 ? 'green' : 'red');
            
            const serieEl = document.getElementById('serieEnCours');
            serieEl.textContent = stats.serieGagne ? '✅ GAINS' : '❌ PERTES';
            serieEl.className = stats.serieGagne ? 'green' : 'red';
            
            document.getElementById('bankrollActuelle').textContent = stats.bankrollActuelle.toFixed(2) + ' €';
            
            if (stats.bankrollHistory.length > 1) drawSparkline('sparklineCanvas', stats.bankrollHistory);
            
            const container = document.getElementById('lastBets');
            container.innerHTML = '';
            stats.lastBets.forEach(bet => {
                const div = document.createElement('div');
                div.className = 'bet-item';
                div.innerHTML = `
                    <div>
                        <div style="font-weight:500;">${bet.match}</div>
                        <div style="font-size:12px; color:#757575;">${bet.date}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:500; color:${bet.benefice >= 0 ? '#2e7d32' : '#c62828'};">${bet.benefice >= 0 ? '+' : ''}${bet.benefice.toFixed(2)} €</div>
                        <div style="font-size:12px;">${bet.resultat}</div>
                    </div>
                `;
                container.appendChild(div);
            });
            
            document.getElementById('updateTime').textContent = 'Mis à jour le ' + new Date().toLocaleString('fr-FR');
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('error').textContent = 'Erreur : ' + msg;
        }

        fetchCSV()
            .then(processData)
            .then(displayDashboard)
            .catch(err => showError(err.message));
    </script>
</body>
</html>
