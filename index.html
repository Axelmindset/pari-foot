<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ FootPredict Pro - Version Finale</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    :root { --bg-primary: #000; --bg-card: #1a1a24; --accent: #10b981; --text: #fff; --border: #2a2a38; }
    body { background: var(--bg-primary); color: var(--text); padding: 15px; }
    .container { max-width: 600px; margin: 0 auto; }
    .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
    .tab-btn { flex: 1; padding: 10px; background: var(--bg-card); border: 1px solid var(--border); color: #aaa; cursor: pointer; border-radius: 10px; }
    .tab-btn.active { background: var(--accent); color: #fff; }
    .tab-content { display: none; background: var(--bg-card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); }
    .tab-content.active { display: block; }
    .profile-option { background: #111; padding: 10px; margin: 5px 0; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; text-align: center; }
    .profile-option.selected { background: var(--accent); border-color: #fff; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid var(--border); background: #111; color: #fff; font-weight: bold; }
    .btn-primary { width: 100%; padding: 15px; background: var(--accent); border: none; color: #fff; font-weight: bold; border-radius: 30px; margin: 15px 0; cursor: pointer; }
    .result-card { background: var(--bg-card); border: 2px solid var(--accent); padding: 20px; border-radius: 20px; margin-top: 20px; }
    .score-item { font-size: 2rem; font-weight: bold; background: #222; padding: 10px 20px; border-radius: 15px; }
    .history-item { background: #111; padding: 10px; border-bottom: 1px solid var(--border); margin-top: 5px; }
    .toast { position: fixed; bottom: 20px; width: 80%; left: 10%; background: var(--accent); color: #fff; padding: 10px; border-radius: 20px; text-align: center; display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="openTab('tab1', this)">Équipe A</button>
    <button class="tab-btn" onclick="openTab('tab2', this)">Équipe B</button>
    <button class="tab-btn" onclick="openTab('tab3', this)">Outils</button>
    <button class="tab-btn" onclick="openTab('tab4', this)">Historique</button>
  </div>

  <div id="tab1" class="tab-content active">
    <input type="text" id="teamA" value="Paris SG">
    <div id="optsA"></div>
  </div>

  <div id="tab2" class="tab-content">
    <input type="text" id="teamB" value="Toulouse">
    <div id="optsB"></div>
  </div>

  <div id="tab3" class="tab-content">
    <button class="btn-primary" style="background:#444;" onclick="saveAll()">💾 Sauvegarder Profils</button>
    <button class="btn-primary" style="background:#444;" onclick="loadAll()">📂 Charger Profils</button>
  </div>

  <div id="tab4" class="tab-content">
    <button onclick="clearHistory()" style="color:red; background:none; border:none; margin-bottom:10px;">Effacer l'historique</button>
    <div id="historyList"></div>
  </div>

  <button class="btn-primary" onclick="runAnalysis()">🚀 ANALYSER LE MATCH</button>
  <div id="resultats"></div>
</div>

<div id="toast" class="toast"></div>

<script>
  // Données et Config
  let profiles = { a: {}, b: {} };
  const categories = [
    { id: 'forme', label: 'FORME', options: [{n:'Bonne', v:4}, {n:'Neutre', v:1}, {n:'Crise', v:-2}] },
    { id: 'context', label: 'CONTEXTE', options: [{n:'Décisif', v:4}, {n:'Normal', v:0}] }
  ];

  window.onload = () => {
    renderOptions();
    loadHistory();
  };

  function renderOptions() {
    ['a', 'b'].forEach(t => {
      let html = '';
      categories.forEach(c => {
        html += `<p style="font-size:0.7rem; margin-top:10px;">${c.label}</p>`;
        c.options.forEach((o, i) => {
          let sel = (i===1) ? 'selected' : '';
          if(i===1) profiles[t][c.id] = o.v;
          html += `<div class="profile-option ${sel}" onclick="selectOpt('${t}','${c.id}',${o.v}, this)">${o.n}</div>`;
        });
      });
      document.getElementById('opts'+t.toUpperCase()).innerHTML = html;
    });
  }

  function selectOpt(team, cat, val, el) {
    let opts = el.parentElement.querySelectorAll('.profile-option');
    opts.forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    profiles[team][cat] = val;
  }

  function runAnalysis() {
    let ptsA = 0; for(let k in profiles.a) ptsA += profiles.a[k];
    let ptsB = 0; for(let k in profiles.b) ptsB += profiles.b[k];
    
    const nameA = document.getElementById('teamA').value;
    const nameB = document.getElementById('teamB').value;

    // Calcul des scores selon tes points
    let s1A = Math.max(0, Math.floor(ptsA/2));
    let s1B = Math.max(0, Math.floor(ptsB/2));
    let s2A = s1A + 1;
    let s2B = (ptsB > ptsA) ? s1B + 1 : s1B;

    // --- RÈGLE 1 : PRONOSTIC SÛR (OVER/UNDER) ---
    let totalScore1 = s1A + s1B;
    let totalScore2 = s2A + s2B;
    let safeBet = (totalScore1 + totalScore2 >= 4) ? "Over 2.5 Buts" : "Under 3.5 Buts";

    // --- RÈGLE 2 : MATCH NUL & DOMINANCE ---
    if (s1A === s1B && s2A === s2B) {
        let dominante = (ptsA >= ptsB) ? nameA : nameB;
        safeBet = dominante + " ou Nul";
    }

    // --- RÈGLE 3 : BTTS AJUSTÉ ---
    let btts = "OUI";
    // Si l'un des scores contient un 0 (ex: 3-0), BTTS est plus risqué
    if (s1A === 0 || s1B === 0 || s2A === 0 || s2B === 0) btts = "NON";
    // Correction spécifique demandée : 3-0 et 3-1 -> NON
    if ((s1A === 3 && s1B === 0) && (s2A === 3 && s2B === 1)) btts = "NON";
    // Validation des BTTS OUI (2-2, 3-2, etc)
    if (s1A > 0 && s1B > 0 && s2A > 0 && s2B > 0) btts = "OUI";

    const resHTML = `
      <div class="result-card">
        <center><small>PRONOSTIC LE PLUS SÛR</small><br><h2 style="color:var(--accent)">${safeBet}</h2></center>
        <div style="display:flex; justify-content:center; gap:10px; margin:15px 0;">
          <div class="score-item">${s1A}-${s1B}</div>
          <div class="score-item">${s2A}-${s2B}</div>
        </div>
        <p>⚡ BTTS : <b>${btts}</b></p>
        <p>📐 Corners : <b>7 - 11</b></p>
        <button class="btn-primary" onclick="copyWA()">COPIER WHATSAPP</button>
      </div>`;
    
    document.getElementById('resultats').innerHTML = resHTML;
    saveToHistory({match: nameA+' vs '+nameB, score: s1A+'-'+s1B+' / '+s2A+'-'+s2B, prono: safeBet});
  }

  // Fonctions Techniques (Historique et Sauvegarde)
  function saveToHistory(obj) {
    let history = JSON.parse(localStorage.getItem('my_history') || '[]');
    history.unshift(obj);
    localStorage.setItem('my_history', JSON.stringify(history));
    loadHistory();
  }

  function loadHistory() {
    let history = JSON.parse(localStorage.getItem('my_history') || '[]');
    document.getElementById('historyList').innerHTML = history.map(h => `
      <div class="history-item">
        <b>${h.match}</b><br><small>${h.score} | ${h.prono}</small>
      </div>`).join('');
  }

  function clearHistory() {
    localStorage.removeItem('my_history');
    loadHistory();
    showToast("Historique effacé");
  }

  function saveAll() {
    localStorage.setItem('my_profiles', JSON.stringify(profiles));
    localStorage.setItem('my_teams', JSON.stringify([document.getElementById('teamA').value, document.getElementById('teamB').value]));
    showToast("Profils enregistrés !");
  }

  function loadAll() {
    let p = localStorage.getItem('my_profiles');
    if(p) {
      profiles = JSON.parse(p);
      let t = JSON.parse(localStorage.getItem('my_teams'));
      document.getElementById('teamA').value = t[0];
      document.getElementById('teamB').value = t[1];
      showToast("Profils chargés !");
    }
  }

  function openTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function showToast(m) {
    let t = document.getElementById('toast');
    t.innerText = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2000);
  }

  function copyWA() {
    let r = document.getElementById('resultats').innerText;
    navigator.clipboard.writeText(r);
    showToast("Copié !");
  }
</script>

</body>
</html>
