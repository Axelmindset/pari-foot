<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Prédiction Football</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 50px;
    }

    select, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    .result {
      margin-top: 30px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Analyse Match ⚽</h1>

  <select id="teamA">
    <option value="33">Manchester United</option>
    <option value="34">Newcastle</option>
  </select>

  <select id="teamB">
    <option value="40">Liverpool</option>
    <option value="50">Manchester City</option>
  </select>

  <br>

  <button onclick="analyzeMatch()">Analyser</button>

  <div class="result" id="result"></div>
</div>

<script>

const API_KEY = "A28FA0BD7BMSHF2485309322DDE3P17150AJSND40263385750";

// ⚠️ Exemple avec structure type API-Football (à adapter)
async function getLastMatches(teamId) {
  const url = `https://api-football-v1.p.rapidapi.com/v3/fixtures?team=${teamId}&last=3`;

  const response = await fetch(url, {
    method: "GET",
    headers: {
      "x-rapidapi-key": API_KEY,
      "x-rapidapi-host": "api-football-v1.p.rapidapi.com"
    }
  });

  const data = await response.json();
  return data.response;
}

// Calcul simplifié
function calculateStats(matches) {
  let shots = 0;
  let shotsOnTarget = 0;
  let goals = 0;

  matches.forEach(match => {
    shots += Math.random() * 10; // ⚠️ à remplacer par vraies stats
    shotsOnTarget += Math.random() * 5;
    goals += Math.random() * 3;
  });

  return {
    attack: shotsOnTarget + goals,
    defense: 10 - shots,
  };
}

function predict(teamAStats, teamBStats) {
  let scoreA = teamAStats.attack - teamAStats.defense;
  let scoreB = teamBStats.attack - teamBStats.defense;

  let total = Math.abs(scoreA) + Math.abs(scoreB);

  let probA = ((scoreA + total) / (2 * total)) * 100;
  let probB = ((scoreB + total) / (2 * total)) * 100;
  let draw = 100 - (probA + probB);

  return {
    probA: probA.toFixed(1),
    probB: probB.toFixed(1),
    draw: draw.toFixed(1)
  };
}

async function analyzeMatch() {
  const teamA = document.getElementById("teamA").value;
  const teamB = document.getElementById("teamB").value;

  document.getElementById("result").innerHTML = "Analyse en cours...";

  const matchesA = await getLastMatches(teamA);
  const matchesB = await getLastMatches(teamB);

  const statsA = calculateStats(matchesA);
  const statsB = calculateStats(matchesB);

  const prediction = predict(statsA, statsB);

  document.getElementById("result").innerHTML = `
    Victoire Équipe A : ${prediction.probA}% <br>
    Match nul : ${prediction.draw}% <br>
    Victoire Équipe B : ${prediction.probB}% <br><br>
    Analyse : Match équilibré basé sur les performances récentes.
  `;
}

</script>

</body>
</html>
