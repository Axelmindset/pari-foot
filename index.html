<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse & Prédiction Expert</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #2ecc71; max-width: 400px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #2ecc71; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
        .res-box { margin-top: 20px; padding: 15px; background: #2c3e50; border-radius: 10px; display: none; text-align: left; }
        .green { color: #2ecc71; font-weight: bold; }
        .yellow { color: #f1c40f; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Expert Predictor Pro</h2>
        <p style="font-size: 0.8em; color: #aaa;">Analyse des probabilités en temps réel</p>
        
        <input type="text" id="home" placeholder="Équipe Domicile (ex: Southampton)">
        <input type="text" id="away" placeholder="Équipe Extérieur (ex: Arsenal)">
        
        <button onclick="analyserMatch()">LANCER L'ANALYSE EXPERT</button>

        <div id="resultat" class="res-box">
            <p id="matchTitle" style="border-bottom: 1px solid #555; padding-bottom: 5px;"></p>
            <p>📊 **Probabilités 1N2 :** <span id="prob"></span></p>
            <p>⚽ **Buts (Over/Under) :** <span id="goals" class="green"></span></p>
            <p>🚩 **Corners attendus :** <span id="corners" class="yellow"></span></p>
            <p>🛡️ **Handicap suggéré :** <span id="handicap"></span></p>
            <p>💡 **Conseil Expert :** <span id="conseil" class="green"></span></p>
        </div>
    </div>

    <script>
        function analyserMatch() {
            const h = document.getElementById('home').value.trim();
            const a = document.getElementById('away').value.trim();
            if(!h || !a) return alert("Entrez les deux noms !");

            // --- LOGIQUE DE CALCUL DYNAMIQUE ---
            // On simule une force basée sur les noms (ou aléatoire pour le test)
            let forceHome = Math.floor(Math.random() * 50) + 20;
            let forceAway = Math.floor(Math.random() * 50) + 30;

            // Si c'est Arsenal, Manchester, Real etc, on augmente leur force artificiellement pour le test
            const favoris = ["Arsenal", "Man City", "Real Madrid", "Liverpool", "Bayern", "PSG", "Barca"];
            if(favoris.some(f => a.toLowerCase().includes(f.toLowerCase()))) forceAway += 30;
            if(favoris.some(f => h.toLowerCase().includes(f.toLowerCase()))) forceHome += 30;

            const total = forceHome + forceAway + 20; // +20 pour le nul
            const p1 = Math.round((forceHome/total)*100);
            const pX = Math.round((20/total)*100);
            const p2 = 100 - p1 - pX;

            const corners = (Math.random() * (12 - 7) + 7).toFixed(1);
            const isOver = Math.random() > 0.4;

            // --- AFFICHAGE ---
            document.getElementById('resultat').style.display = "block";
            document.getElementById('matchTitle').innerHTML = `<strong>${h} vs ${a}</strong>`;
            document.getElementById('prob').innerText = `${p1}% | ${pX}% | ${p2}%`;
            document.getElementById('goals').innerText = isOver ? "Over 2.5 Buts (62%)" : "Under 3.5 Buts (70%)";
            document.getElementById('corners').innerText = `~ ${corners} Corners`;
            
            if(p1 > p2 + 15) {
                document.getElementById('conseil').innerText = `Victoire ou Nul ${h}`;
                document.getElementById('handicap').innerText = `${h} (0)`;
            } else if (p2 > p1 + 15) {
                document.getElementById('conseil').innerText = `Victoire ou Nul ${a}`;
                document.getElementById('handicap').innerText = `${a} (0)`;
            } else {
                document.getElementById('conseil').innerText = "Match Serré (Double Chance)";
                document.getElementById('handicap').innerText = "Handicap +1.5";
            }
        }
    </script>
</body>
</html>
