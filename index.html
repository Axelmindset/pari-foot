<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Prédiction Football IA</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  margin-top: 40px;
}

select, button {
  padding: 10px;
  margin: 10px;
  font-size: 16px;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>⚽ Analyse Match</h1>

  <select id="teamA">
    <option value="17">Barcelona</option>
    <option value="42">Arsenal</option>
  </select>

  <select id="teamB">
    <option value="33">Manchester United</option>
    <option value="50">Manchester City</option>
  </select>

  <br>
  <button onclick="analyze()">Analyser</button>

  <div id="result"></div>
</div>

<script>

// 🔐 TA CLÉ API
const API_KEY = "a28fa0bd7bmshf24853091a4050dp194645jsnf30261d7e2";

// 📡 Récupération des 3 derniers matchs
async function getMatches(teamId) {
  const url = `https://sofascore.p.rapidapi.com/teams/get-last-matches?teamId=${teamId}&pageIndex=0`;

  try {
    const response = await fetch(url, {
      method: "GET",
      headers: {
        "X-RapidAPI-Key": API_KEY,
        "X-RapidAPI-Host": "sofascore.p.rapidapi.com"
      }
    });

    const data = await response.json();
    console.log("DATA API:", data);

    return data.events ? data.events.slice(0, 3) : [];

  } catch (error) {
    console.error("Erreur API:", error);
    return [];
  }
}

// 📊 Extraction + simulation intelligente des stats
function extractStats(matches) {

  let shots = 0;
  let shotsOnTarget = 0;
  let goals = 0;
  let conceded = 0;
  let corners = 0;

  matches.forEach(match => {

    let homeGoals = match.homeScore?.current || 0;
    let awayGoals = match.awayScore?.current || 0;

    // ⚠️ Simulation réaliste basée sur score
    goals += homeGoals;
    conceded += awayGoals;

    shots += (homeGoals + 6);
    shotsOnTarget += (homeGoals + 3);
    corners += (homeGoals + 4);
  });

  let xG = shotsOnTarget * 0.3;
  let xGA = conceded * 0.6;

  return {
    attack: shotsOnTarget + xG,
    defense: (10 - conceded) + xGA,
    pressure: corners,
    goals,
    shots,
    shotsOnTarget,
    xG,
    xGA
  };
}

// 🤖 Algorithme de prédiction
function predict(a, b) {

  let scoreA =
    (a.attack * 0.3) +
    (a.defense * 0.3) +
    (a.pressure * 0.2);

  let scoreB =
    (b.attack * 0.3) +
    (b.defense * 0.3) +
    (b.pressure * 0.2);

  let total = scoreA + scoreB;

  let probA = (scoreA / total) * 100;
  let probB = (scoreB / total) * 100;
  let draw = 100 - (probA + probB);

  return {
    A: probA.toFixed(1),
    B: probB.toFixed(1),
    D: draw.toFixed(1)
  };
}

// 📈 Prédictions avancées
function advanced(a, b) {

  let totalGoals = a.goals + b.goals;
  let totalCorners = a.pressure + b.pressure;

  return {
    over25: totalGoals > 2 ? "Over 2.5 🔥" : "Under 2.5",
    corners: totalCorners > 10 ? "Over Corners 🔥" : "Under Corners",
    doubleChance: a.goals >= b.goals ? "1X" : "X2"
  };
}

// 🧠 Analyse textuelle
function generateText(a, b) {

  if (a.attack > b.attack && a.defense > b.defense) {
    return "L'équipe A domine offensivement et défensivement. Forte probabilité de victoire.";
  }

  if (b.attack > a.attack && b.defense > a.defense) {
    return "L'équipe B semble supérieure sur tous les plans.";
  }

  return "Match équilibré avec incertitude élevée.";
}

// 🚀 Fonction principale
async function analyze() {

  document.getElementById("result").innerHTML = "Analyse en cours...";

  const teamA = document.getElementById("teamA").value;
  const teamB = document.getElementById("teamB").value;

  const matchesA = await getMatches(teamA);
  const matchesB = await getMatches(teamB);

  if (matchesA.length === 0 || matchesB.length === 0) {
    document.getElementById("result").innerHTML = "Erreur : données API indisponibles.";
    return;
  }

  const statsA = extractStats(matchesA);
  const statsB = extractStats(matchesB);

  const prediction = predict(statsA, statsB);
  const adv = advanced(statsA, statsB);
  const text = generateText(statsA, statsB);

  document.getElementById("result").innerHTML = `
    <div class="card">
      <h2>📊 Probabilités</h2>
      Victoire A : ${prediction.A}% <br>
      Match nul : ${prediction.D}% <br>
      Victoire B : ${prediction.B}%
    </div>

    <div class="card">
      <h2>📈 Prédictions</h2>
      Double chance : ${adv.doubleChance} <br>
      Over/Under 2.5 : ${adv.over25} <br>
      Corners : ${adv.corners}
    </div>

    <div class="card">
      <h2>🧠 Analyse IA</h2>
      ${text}
    </div>
  `;
}

</script>

</body>
</html>
